<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name List Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      max-width: 650px; 
      margin: 2rem auto; 
      padding: 0 1rem; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h2 { 
      text-align: center; 
      color: #333; 
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    .form-container { 
      background: #f8f9fa; 
      padding: 1rem; 
      border-radius: 8px; 
      margin-bottom: 1.5rem;
      border: 1px solid #e9ecef;
    }
    .form-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    input[type="text"] { 
      flex: 1;
      min-width: 200px;
      padding: 0.7rem; 
      border: 2px solid #ddd; 
      border-radius: 6px; 
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button { 
      padding: 0.7rem 1.2rem; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
      white-space: nowrap;
    }
    button[type="submit"] { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
    }
    button[type="submit"]:hover { 
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    #cancelBtn { 
      background: #f44336; 
      color: white;
      display: none; 
    }
    #cancelBtn:hover { background: #d32f2f; }
    
    #nameList { 
      list-style: none; 
      padding: 0; 
    }
    #nameList li { 
      background: #fff; 
      padding: 1rem; 
      margin-bottom: 0.75rem; 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid #667eea;
      transition: transform 0.2s;
    }
    #nameList li:hover {
      transform: translateX(4px);
    }
    #nameList li span {
      font-size: 1.05rem;
      color: #333;
      flex: 1;
    }
    .actions { 
      display: flex; 
      gap: 0.4rem; 
    }
    .actions button { 
      padding: 0.45rem 0.8rem; 
      font-size: 0.85rem; 
      border-radius: 5px;
    }
    .edit-btn { 
      background: #2196F3; 
      color: white; 
    }
    .edit-btn:hover { background: #1976D2; }
    .delete-btn { 
      background: #f44336; 
      color: white; 
    }
    .delete-btn:hover { background: #d32f2f; }
    
    .empty-msg {
      text-align: center;
      color: #777;
      padding: 2rem;
      font-style: italic;
    }
    .status-msg {
      text-align: center;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      display: none;
    }
    .status-msg.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status-msg.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    .timestamp {
      font-size: 0.75rem;
      color: #999;
      margin-left: 0.5rem;
    }
    
    @media (max-width: 500px) {
      .form-row { flex-direction: column; }
      button { width: 100%; }
      #nameList li { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
      .actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📝 Name List Manager</h2>
    
    <div id="statusMsg" class="status-msg"></div>
    
    <div class="form-container">
      <form id="nameForm">
        <input type="hidden" id="editId">
        <div class="form-row">
          <input type="text" id="nameInput" placeholder="Enter name..." required autocomplete="off">
          <button type="submit" id="submitBtn">➕ Add</button>
          <button type="button" id="cancelBtn" onclick="resetForm()">❌ Cancel</button>
        </div>
      </form>
    </div>

    <ul id="nameList">
      <!-- Names will be loaded dynamically here -->
    </ul>
  </div>

  <script>
    // 🔗 API Base URL - Updated to your server IP
    const API_BASE = 'http://16.52.168.237:3000';
    const API_URL = `${API_BASE}/api/names`;

    // DOM Elements
    const form = document.getElementById('nameForm');
    const nameInput = document.getElementById('nameInput');
    const editIdInput = document.getElementById('editId');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const nameList = document.getElementById('nameList');
    const statusMsg = document.getElementById('statusMsg');

    // 📥 Fetch all names
    async function fetchNames() {
      try {
        showStatus('Loading...', 'success');
        const res = await fetch(API_URL);
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const names = await res.json();
        renderNames(names);
        hideStatus();
      } catch (err) {
        console.error('❌ Fetch error:', err);
        showStatus('Failed to fetch data from server! Check CORS or server status.', 'error');
      }
    }

    // 🎨 Render names to the list
    function renderNames(names) {
      nameList.innerHTML = '';
      
      if (!names || names.length === 0) {
        nameList.innerHTML = '<li class="empty-msg">📭 No names added yet</li>';
        return;
      }
      
      names.forEach(n => {
        const li = document.createElement('li');
        const date = n.createdAt ? new Date(n.createdAt).toLocaleDateString('en-US') : '';
        
        li.innerHTML = `
          <div>
            <span>${escapeHtml(n.name)}</span>
            ${date ? `<span class="timestamp">📅 ${date}</span>` : ''}
          </div>
          <div class="actions">
            <button class="edit-btn" onclick="editName('${n._id}', '${escapeHtml(n.name)}')">✏️ Edit</button>
            <button class="delete-btn" onclick="deleteName('${n._id}')">🗑️ Delete</button>
          </div>
        `;
        nameList.appendChild(li);
      });
    }

    // 🛡️ Prevent XSS attacks
    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // 📢 Show status message
    function showStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = `status-msg ${type}`;
      setTimeout(() => hideStatus(), 3000);
    }
    
    function hideStatus() {
      statusMsg.style.display = 'none';
    }

    // ➕➡️💾 Handle form submit (Add or Update)
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      const id = editIdInput.value;
      
      if (!name) {
        showStatus('Name cannot be empty!', 'error');
        return;
      }

      try {
        const url = id ? `${API_URL}/${id}` : API_URL;
        const method = id ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `HTTP ${res.status}`);
        }
        
        showStatus(id ? '✅ Name updated!' : '✅ Name added!', 'success');
        resetForm();
        fetchNames();
        
      } catch (err) {
        console.error('❌ Save error:', err);
        showStatus(`Error: ${err.message}`, 'error');
      }
    });

    // ✏️ Enable edit mode
    function editName(id, name) {
      editIdInput.value = id;
      nameInput.value = name;
      submitBtn.textContent = '💾 Update';
      submitBtn.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
      cancelBtn.style.display = 'inline-block';
      nameInput.focus();
      nameInput.select();
    }

    // 🗑️ Delete a name
    async function deleteName(id) {
      if (!confirm('⚠️ Are you sure you want to delete this name?')) return;
      
      try {
        const res = await fetch(`${API_URL}/${id}`, { 
          method: 'DELETE' 
        });
        
        if (!res.ok) throw new Error('Delete failed');
        
        showStatus('🗑️ Name deleted!', 'success');
        fetchNames();
      } catch (err) {
        console.error('❌ Delete error:', err);
        showStatus('Failed to delete!', 'error');
      }
    }

    // 🔄 Reset form to default state
    function resetForm() {
      form.reset();
      editIdInput.value = '';
      submitBtn.textContent = '➕ Add';
      submitBtn.style.background = '';
      cancelBtn.style.display = 'none';
    }

    // 🚀 Fetch data when page loads
    document.addEventListener('DOMContentLoaded', fetchNames);
  </script>
</body>
</html>
